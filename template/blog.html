<!doctype html>
<html lang="{{.Language}}" data-theme="{{.ThemeDefault}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Labels.AllPosts}} - {{.SiteTitle}}</title>
    <meta name="description" content="{{.SiteDescription}}" />
    <link rel="canonical" href="{{.BaseURL}}{{.CanonicalPath}}" />
    <link rel="alternate" type="application/rss+xml" title="{{.SiteTitle}}" href="{{.RSSPath}}" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/theme.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="{{.HomePath}}">{{.SiteTitle}}</a>
        <div class="nav-links">
          <a class="icon-link" href="{{.HomePath}}" aria-label="{{.Labels.Home}}" title="{{.Labels.Home}}">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3.5 11.5 12 4l8.5 7.5"></path>
              <path d="M5.5 10.5V20h13v-9.5"></path>
              <path d="M9.5 20v-5h5v5"></path>
            </svg>
          </a>
          <a href="{{.BlogPath}}">{{.Labels.Blog}}</a>
          <a class="icon-link" href="{{.RSSPath}}" aria-label="RSS" title="RSS">
            <svg class="nav-icon nav-icon-rss" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M5 5a14 14 0 0 1 14 14"></path>
              <path d="M5 11a8 8 0 0 1 8 8"></path>
              <circle cx="5.8" cy="18.2" r="1.7"></circle>
            </svg>
          </a>
          {{if .GitHubURL}}<a href="{{.GitHubURL}}" rel="me">GitHub</a>{{end}} {{if .TelegramURL}}<a
            href="{{.TelegramURL}}"
            rel="me"
            >Telegram</a
          >{{end}}
          <button
            type="button"
            class="theme-toggle icon-button"
            data-theme-toggle
            aria-label="{{.Labels.ThemeButtonLabel}}"
            title="{{.Labels.ThemeButtonLabel}}"
          >
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </svg>
          </button>
        </div>
      </nav>
    </header>

    <main class="page">
      <section class="archive">
        <h1>{{.Labels.AllPosts}}</h1>
        {{range .Posts}}
        <article class="post-item compact">
          <time datetime="{{.Date}}">{{.Date}}</time>
          <h2><a href="{{.PublicURL}}">{{.Title}}</a></h2>
          <p>{{.Description}}</p>
        </article>
        {{else}}
        <p class="empty">{{.Labels.NoPosts}}</p>
        {{end}}
      </section>
    </main>

    <footer class="site-footer">
      <p>{{.Labels.Footer}}</p>
    </footer>
  </body>
</html>
