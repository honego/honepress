<!doctype html>
<html lang="{{.Language}}" data-theme="{{.ThemeDefault}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{.Post.Title}} - {{.SiteTitle}}</title>
    <meta name="description" content="{{.Post.Description}}" />
    <link rel="canonical" href="{{.BaseURL}}{{.CanonicalPath}}" />
    <link rel="stylesheet" href="/style.css" />
    <script src="https://fastly.jsdelivr.net/npm/lucide@1.14.0/dist/umd/lucide.min.js" defer></script>
    <script src="/theme.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="{{.HomePath}}">{{.SiteTitle}}</a>
        <div class="nav-links">
          <a class="icon-link" href="{{.HomePath}}" aria-label="{{.Labels.Home}}" title="{{.Labels.Home}}">
            <i class="nav-icon" data-lucide="house" aria-hidden="true"></i>
          </a>
          <a href="{{.BlogPath}}">{{.Labels.Blog}}</a>
          <a class="icon-link" href="{{.RSSPath}}" aria-label="RSS" title="RSS">
            <i class="nav-icon" data-lucide="rss" aria-hidden="true"></i>
          </a>
          {{if .GitHubURL}}<a href="{{.GitHubURL}}" rel="me">GitHub</a>{{end}} {{if .TelegramURL}}<a
            href="{{.TelegramURL}}"
            rel="me"
            >Telegram</a
          >{{end}}
          <button
            type="button"
            class="theme-toggle icon-button"
            data-theme-toggle
            aria-label="{{.Labels.ThemeButtonLabel}}"
            title="{{.Labels.ThemeButtonLabel}}"
          >
            <i class="nav-icon" data-lucide="moon" aria-hidden="true"></i>
          </button>
        </div>
      </nav>
    </header>

    <main class="page">
      <article class="article">
        <a class="back-link" href="{{.BlogPath}}">{{.Labels.BackToList}}</a>
        <header class="article-header">
          <time datetime="{{.Post.DateText}}">{{.Labels.PublishedAt}} {{.Post.DateText}}</time>
          <h1>{{.Post.Title}}</h1>
          <p>{{.Post.Description}}</p>
        </header>
        <div class="content">{{.Post.BodyHTML}}</div>
      </article>
      {{.CommentHTML}}
    </main>

    <footer class="site-footer">
      <p>{{.Labels.Footer}}</p>
    </footer>
  </body>
</html>
